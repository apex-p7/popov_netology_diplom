name: sample-app CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: sample-static-site
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_JSON }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.YC_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-on-tag:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.YC_REGISTRY }}" ] || { echo "YC_REGISTRY secret is empty"; exit 1; }
          [ -n "${{ secrets.KUBE_CONFIG_B64 }}" ] || { echo "KUBE_CONFIG_B64 secret is empty"; exit 1; }

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Deploy image to cluster
        env:
          TAG: ${{ github.ref_name }}
        run: |
          kubectl -n sample-app set image deployment/static-site nginx=${{ secrets.YC_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG} --record
          kubectl -n sample-app rollout status deployment/static-site
