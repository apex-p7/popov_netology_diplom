name: sample-app CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: sample-static-site
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.YC_SA_JSON }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.YC_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-on-tag:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install Helm
        run: |
          HELM_VERSION="v3.14.4"
          curl -fsSL -o helm.tar.gz https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz
          tar -zxvf helm.tar.gz
          install -m 0755 linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Install yc CLI
        run: |
          curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /opt/yc -n
          echo "/opt/yc/bin" >> "$GITHUB_PATH"
          /opt/yc/bin/yc version

      - name: Validate required secrets
        env:
          YC_REGISTRY: ${{ secrets.YC_REGISTRY }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          YC_SA_JSON: ${{ secrets.YC_SA_JSON }}
        run: |
          [ -n "${YC_REGISTRY}" ] || { echo "YC_REGISTRY secret is empty"; exit 1; }
          [ -n "${KUBE_CONFIG_B64}" ] || { echo "KUBE_CONFIG_B64 secret is empty"; exit 1; }
          [ -n "${YC_SA_JSON}" ] || { echo "YC_SA_JSON secret is empty"; exit 1; }

      - name: Configure yc profile
        env:
          YC_SA_JSON: ${{ secrets.YC_SA_JSON }}
        run: |
          umask 077
          SA_KEY="$(mktemp)"
          printf '%s' "${YC_SA_JSON}" > "${SA_KEY}"
          yc config profile create default 2>/dev/null || true
          yc config set service-account-key "${SA_KEY}"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > ~/.kube/config
          sed -i 's|command: /home/master/yandex-cloud/bin/yc|command: yc|g' ~/.kube/config
          sed -i 's|command: /root/yandex-cloud/bin/yc|command: yc|g' ~/.kube/config

      - name: Deploy via Helm
        env:
          TAG: ${{ github.ref_name }}
        run: |
          IMAGE_TAG="${TAG#v}"

          helm upgrade --install static-site ./helm \
            --namespace sample-app \
            --create-namespace \
            --set image.repository=${{ secrets.YC_REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${IMAGE_TAG}

          kubectl -n sample-app rollout status deployment/static-site --timeout=5m || {
            kubectl -n sample-app get pods -o wide
            kubectl -n sample-app describe deployment static-site
            kubectl -n sample-app get events --sort-by=.metadata.creationTimestamp | tail -n 50
            exit 1
          }
