version: 3
automerge: false
parallel_plan: true
parallel_apply: true

projects:
  - name: terraform-infra
    dir: terraform-infra
    workflow: default
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - ".terraform.lock.hcl"
      enabled: true

workflows:
  default:
    plan:
      steps:
        - init:
            extra_args: ["-backend-config=backend.hcl"]
        - plan
    apply:
      steps:
        - apply
